<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h3>Bilibili快捷键管理</h3>
        </div>

        <div class="controls">
            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-g" data-key="g">
                    <span class="slider"></span>
                </label>
                <span class="key-name">G</span>
                <span class="key-label">关注</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-q" data-key="q">
                    <span class="slider"></span>
                </label>
                <span class="key-name">Q</span>
                <span class="key-label">点赞</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-w" data-key="w">
                    <span class="slider"></span>
                </label>
                <span class="key-name">W</span>
                <span class="key-label">投币</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-e" data-key="e">
                    <span class="slider"></span>
                </label>
                <span class="key-name">E</span>
                <span class="key-label">收藏</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-r" data-key="r">
                    <span class="slider"></span>
                </label>
                <span class="key-name">R</span>
                <span class="key-label">三连</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-f" data-key="f">
                    <span class="slider"></span>
                </label>
                <span class="key-name">F</span>
                <span class="key-label">全屏</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-d" data-key="d">
                    <span class="slider"></span>
                </label>
                <span class="key-name">D</span>
                <span class="key-label">弹幕</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-d" data-key="d">
                    <span class="slider"></span>
                </label>
                <span class="key-name">M</span>
                <span class="key-label">静音</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-arrows" data-key="arrows">
                    <span class="slider"></span>
                </label>
                <span class="key-name">←→</span>
                <span class="key-label">快进</span>
            </div>
            
            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-volume" data-key="volume">
                    <span class="slider"></span>
                </label>
                <span class="key-name">↑↓</span>
                <span class="key-label">音量</span>
            </div>
            
            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-brackets" data-key="brackets">
                    <span class="slider"></span>
                </label>
                <span class="key-name">[]</span>
                <span class="key-label">切集</span>
            </div>
        </div>

        <div class="actions">
            <button id="enable-all">全部禁用</button>
            <button id="disable-all">全部启用</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
