<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h3>Bilibili快捷键管理</h3>
            <div class="site-info">bilibili.com</div>
        </div>

        <div class="controls">
            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-g" data-key="g">
                    <span class="slider"></span>
                </label>
                <span class="key-label">G键</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-q" data-key="q">
                    <span class="slider"></span>
                </label>
                <span class="key-label">Q键</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-w" data-key="w">
                    <span class="slider"></span>
                </label>
                <span class="key-label">W键</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-e" data-key="e">
                    <span class="slider"></span>
                </label>
                <span class="key-label">E键</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-r" data-key="r">
                    <span class="slider"></span>
                </label>
                <span class="key-label">R键</span>
            </div>

            <div class="control-item">
                <label class="switch">
                    <input type="checkbox" id="key-f" data-key="f">
                    <span class="slider"></span>
                </label>
                <span class="key-label">F键</span>
            </div>
        </div>

        <div class="actions">
            <button id="enable-all">全部开启</button>
            <button id="disable-all">全部关闭</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
